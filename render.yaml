services:
  - type: web
    name: copaw-app
    runtime: python
    plan: free
    # Step 1: Build the frontend console
    # Step 2: Move frontend assets to the backend package
    # Step 3: Install the Python package in editable mode
    buildCommand: |
      cd console && npm ci && npm run build && cd ..
      mkdir -p src/copaw/console
      cp -R console/dist/. src/copaw/console/
      pip install -e .
    # Start the CoPaw application on the port provided by Render
    startCommand: copaw app --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: DASHSCOPE_API_KEY
        sync: false  # You will set this in the Render Dashboard
      - key: OPENAI_API_KEY
        sync: false  # Optional: add other keys as needed
      - key: PYTHON_VERSION
        value: 3.10.0

