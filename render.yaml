services:
  - type: web
    name: copaw
    runtime: docker
    plan: free
    dockerImage: agentscope/copaw:latest
    healthCheckPath: /
    envVars:
      - key: COPAW_WORKING_DIR
        value: /tmp/copaw
      - key: DASHSCOPE_API_KEY   # or OPENAI_API_KEY
        sync: false               # prompts you to enter it securely
